name: Deploy to systemiks.ca

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via git pull on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p 21098 \
            -o StrictHostKeyChecking=no \
            systyvfq@162.254.39.85 << 'DEPLOY'
          set -e

          REPO="https://github.com/AymaneTaj/systemiks-web.git"
          DEPLOY_PATH="$HOME/systemiks-web"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            git clone "$REPO" "$DEPLOY_PATH"
          else
            cd "$DEPLOY_PATH"
            git pull origin main
          fi

          # Ensure data dir + SQLite exist (gitignored — never overwritten)
          mkdir -p "$DEPLOY_PATH/data"
          touch "$DEPLOY_PATH/data/systemiks.sqlite"
          chmod 664 "$DEPLOY_PATH/data/systemiks.sqlite"
          mkdir -p "$DEPLOY_PATH/public/uploads"

          echo "Deploy complete: $(date)"
          DEPLOY

      - name: Summary
        run: |
          echo "### Deployed to systemiks.ca" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"

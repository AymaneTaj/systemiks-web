name: Deploy to systemiks.tech

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Package site (exclude data, git, cursors)
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='data' \
            --exclude='CURSOR_*.md' \
            --exclude='.cursor' \
            --exclude='ofseek-homepage.html' \
            --exclude='frontend/node_modules' \
            .

      - name: Upload archive to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp \
            -P 21098 \
            -o StrictHostKeyChecking=no \
            /tmp/deploy.tar.gz \
            systyvfq@162.254.39.85:~/deploy_systemiks.tar.gz

      - name: Extract and finalise on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p 21098 \
            -o StrictHostKeyChecking=no \
            systyvfq@162.254.39.85 << 'DEPLOY'
          set -e

          DEPLOY_PATH="$HOME/systemiks.tech"

          # Create deploy dir if first time
          mkdir -p "$DEPLOY_PATH"

          # Extract — never overwrites data/ (not in archive)
          tar xzf ~/deploy_systemiks.tar.gz -C "$DEPLOY_PATH"
          rm ~/deploy_systemiks.tar.gz

          # Ensure data dir + SQLite exist and are writable
          mkdir -p "$DEPLOY_PATH/data"
          touch "$DEPLOY_PATH/data/systemiks.sqlite"
          chmod 664 "$DEPLOY_PATH/data/systemiks.sqlite"
          mkdir -p "$DEPLOY_PATH/public/uploads"

          echo "Deploy complete: $(date)"
          DEPLOY

      - name: Summary
        run: |
          echo "### Deployed to systemiks.tech" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"

name: Deploy to systemiks.tech

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Package site
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='data' \
            --exclude='CURSOR_*.md' \
            --exclude='.cursor' \
            --exclude='ofseek-homepage.html' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            --exclude='docs' \
            .

      - name: Upload to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp \
            -P 21098 \
            -o StrictHostKeyChecking=no \
            /tmp/deploy.tar.gz \
            systyvfq@162.254.39.85:~/deploy_systemiks.tar.gz

      - name: Deploy on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p 21098 \
            -o StrictHostKeyChecking=no \
            systyvfq@162.254.39.85 << 'DEPLOY'
          set -e

          # Extract config/ → ~/config/ (above web root, private)
          tar xzf ~/deploy_systemiks.tar.gz -C "$HOME" \
            --strip-components=1 \
            --wildcards './config/*'

          # Extract public/* → ~/public_html/ (the web root for systemiks.tech)
          tar xzf ~/deploy_systemiks.tar.gz -C "$HOME/public_html" \
            --strip-components=2 \
            --wildcards './public/*'

          rm ~/deploy_systemiks.tar.gz

          # Ensure data dir + SQLite exist at ~/data/ (private, above web root)
          mkdir -p "$HOME/data"
          touch "$HOME/data/systemiks.sqlite"
          chmod 664 "$HOME/data/systemiks.sqlite"

          # Remove old systemiks.tech deploy folder if it exists
          rm -rf "$HOME/systemiks.tech" 2>/dev/null || true

          echo "Deploy complete: $(date)"
          DEPLOY

      - name: Summary
        run: |
          echo "### Deployed to systemiks.tech" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
